apiVersion: openchoreo.dev/v1alpha1

metadata:
  name: oga-service

endpoints:
  - name: api
    port: 8081
    type: REST
    basePath: /
    visibility:
      - external

configurations:
  env:
    - name: OGA_PORT
      value: "8081"
    - name: OGA_FORMS_PATH
      value: ./data/forms
    - name: OGA_DEFAULT_FORM_ID
      value: default
    - name: OGA_ALLOWED_ORIGINS
      value: http://localhost:5174,http://localhost:5175,http://localhost:5176
    - name: OGA_DB_DRIVER
      value: "postgres"
    - name: OGA_DB_HOST
      valueFrom:
        secretKeyRef:
          name: nsw-db-secrets
          key: host
    - name: OGA_DB_PORT
      valueFrom:
        secretKeyRef:
          name: nsw-db-secrets
          key: port
    - name: OGA_DB_USER
      valueFrom:
        secretKeyRef:
          name: nsw-db-secrets
          key: username
    - name: OGA_DB_PASSWORD
      valueFrom:
        secretKeyRef:
          name: nsw-db-secrets
          key: password
    - name: OGA_DB_NAME
      valueFrom:
        secretKeyRef:
          name: nsw-db-secrets
          key: database